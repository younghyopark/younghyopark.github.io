<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSAIL Academic Genealogy</title>
  <meta name="author" content="Younghyo Park">
  <meta name="description" content="An interactive viewer for the CSAIL academic genealogy graph.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="CSAIL Academic Genealogy">
  <meta property="og:description" content="Search, zoom, and explore the CSAIL academic genealogy graph.">
  <meta property="og:url" content="https://younghyopark.me/genealogy/">
  <link rel="stylesheet" href="/stylesheet.css">
  <link rel="stylesheet" href="genealogy.css">
</head>
<body>
  <main class="genealogy-app">
    <header class="topbar">
      <a class="home-link" href="/">Younghyo Park</a>
      <div class="title-block">
        <h1>CSAIL Academic Genealogy</h1>
        <span>2026-06-27 interactive HTML map</span>
      </div>
    </header>

    <button type="button" id="explore-toggle" class="explore-toggle" aria-label="Open controls" aria-controls="explore-panel" aria-expanded="false">
      <span class="explore-toggle-label">Find</span>
      <span class="explore-toggle-detail">Search</span>
    </button>

    <div id="mobile-connection-title" class="mobile-connection-title" aria-hidden="true">
      <span id="mobile-connection-label" class="mobile-connection-label">Academic Connection Between</span>
      <span id="mobile-connection-people" class="mobile-connection-people"></span>
    </div>

    <div id="explore-panel" class="explore-panel" aria-label="Genealogy exploration controls">
      <button type="button" id="explore-close" class="explore-close" aria-label="Fold controls">&times;</button>
      <div class="mode-toggle" role="tablist" aria-label="Exploration mode">
        <button type="button" id="mode-find" class="is-active" role="tab" aria-selected="true" aria-controls="find-panel">Find</button>
        <button type="button" id="mode-connect" role="tab" aria-selected="false" aria-controls="connect-panel">Connect</button>
      </div>
      <div id="find-panel" class="mode-panel find-panel" role="tabpanel" aria-labelledby="mode-find">
        <div class="search-box">
          <label class="search-label" for="person-search">Find Person</label>
          <input id="person-search" type="search" autocomplete="off" placeholder="Name, school, year, or thesis">
          <div id="search-results" class="search-results" hidden></div>
        </div>
      </div>
      <div id="connect-panel" class="mode-panel connect-panel" role="tabpanel" aria-labelledby="mode-connect" hidden>
        <div class="connection-fields">
          <div class="search-box connect-search-box">
            <label class="search-label" for="connect-from-search">From</label>
            <input id="connect-from-search" type="search" autocomplete="off" placeholder="First person">
            <div id="connect-from-results" class="search-results" hidden></div>
          </div>
          <div class="search-box connect-search-box">
            <label class="search-label" for="connect-to-search">To</label>
            <input id="connect-to-search" type="search" autocomplete="off" placeholder="Second person">
            <div id="connect-to-results" class="search-results" hidden></div>
          </div>
        </div>
        <div class="connect-actions" aria-label="Connection actions">
          <button type="button" id="connect-run">Connect</button>
          <button type="button" id="connect-swap">Swap</button>
          <button type="button" id="connect-clear">Clear</button>
        </div>
        <div id="connect-status" class="connect-status" aria-live="polite">Select two people to find the shortest connection.</div>
      </div>
      <div class="view-controls" aria-label="Graph view controls">
        <div class="control-group zoom-group" aria-label="Zoom controls">
          <button type="button" id="zoom-out" class="icon-control" aria-label="Zoom out" title="Zoom out">−</button>
          <button type="button" id="zoom-in" class="icon-control" aria-label="Zoom in" title="Zoom in">+</button>
        </div>
        <div class="control-group view-group" aria-label="View actions">
          <button type="button" id="fit-graph" title="Fit the visible graph in the window">Fit view</button>
          <button type="button" id="lineage-toggle" hidden title="Toggle how much ancestry is shown">Full lineage</button>
          <button type="button" id="clear-selection" title="Return to the complete genealogy map">Whole graph</button>
        </div>
      </div>
    </div>

    <section id="stage" class="stage" aria-label="Interactive CSAIL academic genealogy graph">
      <canvas id="edge-canvas" class="edge-canvas" aria-hidden="true"></canvas>
      <div id="graph-host" class="graph-host">
        <div id="map-world" class="map-world">
          <div id="node-layer" class="node-layer"></div>
          <button type="button" id="lineage-full-action" class="lineage-action lineage-action-full" hidden>Show full lineage</button>
        </div>
      </div>
      <div id="loading" class="loading">Loading graph...</div>
    </section>

    <footer class="source-strip">
      Data from
      <a href="https://people.csail.mit.edu/wollman/genealogy/" target="_blank" rel="noopener">Garrett Wollman's CSAIL Academic Genealogy</a>
      ·
      <a href="csail.dot" target="_blank" rel="noopener">DOT</a>
      ·
      <a href="csail-data.json" target="_blank" rel="noopener">JSON</a>
    </footer>
  </main>

  <script src="genealogy.js"></script>
</body>
</html>
